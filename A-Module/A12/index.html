<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {margin: 0;padding: 0;list-style: none;text-decoration: none;box-sizing: border-box;}
        body {background-color: #252f39;display: flex;justify-content: center;align-items: center;height: 100vh;}
        .circle{width: 30px;height: 30px;border-radius: 50%;position: absolute;display: block;}
        .cir1{background-color: #ffd1dc; animation: ani 2s infinite;animation-delay: 0s;}
        .cir2{background-color: #c3e0e5; animation: ani 2s infinite;animation-delay: -0.5s;}
        .cir3{background-color: #e6daf7; animation: ani 2s infinite;animation-delay: -1s;}
        .cir4{background-color: #ffdab9; animation: ani 2s infinite;animation-delay: -1.5s;} 
        @keyframes ani {
            0%{transform: translate(0px, 0px);}
            25%{transform: translate(0, 50px);}
            50%{transform: translate(-50px, 50px);}
            75%{transform: translate(-50px, 0px);}
            100%{transform: translate(0px, 0px);}
        }
    </style>
</head>
<body>
    <div class="circle cir1"></div>
    <div class="circle cir2"></div>
    <div class="circle cir3"></div>
    <div class="circle cir4"></div>
</body>
</html>
