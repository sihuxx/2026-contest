<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {background-color: white;display: flex;justify-content: center;align-items: center;height: 100vh;transition: .3s;}
        .container {background-color: rgb(189, 189, 189); border-radius: 50px;padding: 20px;height: 50px;width: 150px;}
        .container label {cursor: pointer;background-color: white;border-radius: 50%;width: 50px;height: 50px;display: block;color: white; transition: .3s;}
        #dark:checked ~ .container > label {transform: translateX(100px); background-color: yellow;}
        #dark:checked ~ .container {background-color: darkblue;}
        body:has(#dark:checked) {background-color: #222;}
        
    </style>
</head>

<body>
    <input type="checkbox" id="dark" hidden>
    <div class="container">
        <label for="dark"></label>
    </div>
</body>

</html>
